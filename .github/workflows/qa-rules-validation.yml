name: QA Rules Validation

on:
  push:
    paths:
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "RULE_VERSION"
      - "rules-repository.json"
      - "skills/**"
      - "rules/**"
      - "scripts/**"
      - "tests/**"
      - "testcases/manifest.example.json"
      - "testcases/index.md"
      - "testcases/**/*.json"
      - "testcases/**/*.md"
      - "testcases/**/*.sql"
      - "qa-knowledge/**"
      - "docs/codex/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "RULE_VERSION"
      - "rules-repository.json"
      - "skills/**"
      - "rules/**"
      - "scripts/**"
      - "tests/**"
      - "testcases/manifest.example.json"
      - "testcases/index.md"
      - "testcases/**/*.json"
      - "testcases/**/*.md"
      - "testcases/**/*.sql"
      - "qa-knowledge/**"
      - "docs/codex/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python
        run: python -m compileall -q scripts tests
      - name: Validate Skills
        run: python scripts/validate_skill_contracts.py skills
      - name: Check generated Schemas
        run: python scripts/generate_schemas.py --check
      - name: Validate Schemas and rule version
        run: |
          python scripts/validate_schemas.py
          python scripts/validate_rule_version.py
          python scripts/validate_repository_docs.py
          python scripts/validate_models.py --requirement tests/fixtures/models/requirement-analysis.json --diff tests/fixtures/models/diff-impact.json --risk tests/fixtures/models/risk-coverage-matrix.json --testcase tests/fixtures/models/testcase-model.json
      - name: Validate repository mode
        run: python scripts/validate_repository_mode.py
      - name: Validate rule consistency and fixture governance
        run: |
          python scripts/validate_rule_consistency.py
          python scripts/validate_fixture_layout.py
          python -m unittest discover -s tests -p "test_rule_consistency.py" -v
          python -m unittest discover -s tests -p "test_fixture_governance.py" -v
      - name: Validate knowledge, data validation and SQL artifacts
        run: |
          python scripts/validate_knowledge.py qa-knowledge/examples
          python scripts/build_knowledge_index.py qa-knowledge/examples --check
          python scripts/validate_data_validation.py tests/fixtures/models/data-validation-valid.json
          python scripts/validate_sql_style.py tests/fixtures/sql/valid_validation_sql.sql --strict
          python scripts/validate_sql_artifact.py --artifact tests/fixtures/artifacts/validation-sql-manifest.json --requirement tests/fixtures/models/requirement-analysis.json --diff tests/fixtures/models/diff-impact.json --risk tests/fixtures/models/risk-coverage-matrix.json --testcase tests/fixtures/models/testcase-model.json --knowledge qa-knowledge/examples
          # Compatibility marker: python scripts/validate_sql_artifact.py tests/fixtures/artifacts/validation-sql-manifest.json
          python scripts/validate_api_automation.py --model tests/fixtures/models/api-automation-valid.json
          python scripts/validate_api_automation_artifacts.py --artifact tests/fixtures/api/api-artifact-valid.json --model tests/fixtures/models/api-automation-valid.json
          python scripts/validate_execution_instances.py --execution tests/fixtures/execution/execution-model-valid.json --testcase tests/fixtures/models/testcase-model-multi-entry.json --risk tests/fixtures/models/risk-coverage-matrix.json --requirement tests/fixtures/models/requirement-analysis.json --defects tests/fixtures/execution/defects.json
      - name: Run behavior tests
        run: |
          python -m unittest discover -s tests -p test_schema_migration.py -v
          python -m unittest discover -s tests -p test_anti_hallucination_fixtures.py -v
          python -m unittest discover -s tests -v
      - name: Validate Schema migration, Bundle, negative cases and idempotence
        shell: bash
        run: |
          migration_root="${RUNNER_TEMP}/schema-migration"
          mkdir -p "${migration_root}/reports"
          python scripts/migrate_schema.py --input tests/fixtures/migration/v1/requirement.json --output "${migration_root}/requirement.json" --report "${migration_root}/reports/requirement.json" --from-version 1.0.0 --to-version 2.0.0 --strict
          python scripts/migrate_schema.py --input-dir tests/fixtures/migration/v1/bundle --output-dir "${migration_root}/bundle" --report "${migration_root}/reports/bundle.json" --from-version 1.0.0 --to-version 2.0.0 --strict
          python scripts/migrate_schema.py --input "${migration_root}/requirement.json" --output "${migration_root}/requirement-second.json" --report "${migration_root}/reports/requirement-second.json" --strict
          cmp "${migration_root}/requirement.json" "${migration_root}/requirement-second.json"
          python scripts/validate_schemas.py
          python scripts/validate_models.py --requirement tests/fixtures/models/requirement-analysis.json --diff tests/fixtures/models/diff-impact.json --risk tests/fixtures/models/risk-coverage-matrix.json --testcase tests/fixtures/models/testcase-model.json
          if python scripts/migrate_schema.py --input tests/fixtures/migration/v1/unrecognized.json --output "${migration_root}/invalid.json" --report "${migration_root}/reports/invalid.json" --strict; then exit 1; fi
      - name: Validate Manifest and index encoding
        run: |
          python scripts/validate_manifest.py testcases/manifest.example.json
          python scripts/repair_text_encoding.py testcases/index.md --check
      - name: Convert and verify XMind fixture in temp directory
        shell: bash
        run: |
          output="${RUNNER_TEMP}/valid_case_workbook.xmind"
          python scripts/validate_xmind_md.py tests/fixtures/valid_case_xmind.md
          python scripts/md_to_xmind.py tests/fixtures/valid_case_xmind.md -o "$output"
      - name: Ensure checks leave no generated changes
        run: git diff --exit-code
